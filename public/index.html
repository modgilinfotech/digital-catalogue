<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Catalogue</title>
<meta name="description" content="Browse our latest products and order directly on WhatsApp." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<header class="shop-header" id="shopHeader">
  <div class="shop-header__top">
    <img class="shop-header__logo" id="shopLogo" src="" alt="" hidden />
    <h1 class="shop-header__name" id="shopName">Loading&hellip;</h1>
  </div>
  <div class="shop-header__meta" id="shopMeta"></div>
  <div class="shop-header__socials" id="shopSocials"></div>
</header>

<nav class="category-tabs" id="categoryTabs"></nav>

<main id="productGrid" class="product-grid">
  <div class="loading-state">Loading products&hellip;</div>
</main>

<footer class="catalogue-footer">Powered by your digital catalogue</footer>

<script src="/js/catalogue.js"></script>
</body>
</html>
